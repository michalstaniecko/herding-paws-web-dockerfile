server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index herding-paws.html;

    # Required headers for Godot web exports (SharedArrayBuffer support)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # MIME types for Godot files
    types {
        text/html html;
        application/javascript js;
        application/wasm wasm;
        application/octet-stream pck;
        image/png png;
    }

    # Gzip compression for better performance
    gzip on;
    gzip_types application/javascript application/wasm;

    location / {
        try_files $uri $uri/ /herding-paws.html;
    }

    # Cache static assets (wasm, pck are large)
    location ~* \.(wasm|pck|js|png)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
